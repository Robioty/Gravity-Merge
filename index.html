<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gravity Merge: Ultra Smooth</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #0f172a; font-family: 'Segoe UI', sans-serif; touch-action: none; transition: transform 0.05s; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; pointer-events: none; z-index: 10; }
        #preview-container { position: absolute; top: 20px; right: 20px; background: rgba(30, 41, 59, 0.6); padding: 10px; border-radius: 15px; border: 1px solid rgba(56, 189, 248, 0.3); text-align: center; }
        #overlay { position: absolute; inset: 0; background: rgba(15, 23, 42, 0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; color: white; text-align: center; }
        
        /* Side Gravity Button */
        #side-controls { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); z-index: 50; }
        .g-btn { 
            background: rgba(56, 189, 248, 0.2); color: #38bdf8; border: 2px solid #38bdf8; 
            width: 50px; height: 50px; border-radius: 50%; font-weight: 900; cursor: pointer;
            backdrop-filter: blur(5px); display: none;
        }
        .g-btn:active { background: #38bdf8; color: white; }

        .btn { background: #38bdf8; color: white; border: none; padding: 15px 35px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1.2em; box-shadow: 0 4px 0 #0369a1; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="score-label" style="font-size: 3.5em; font-weight: 900; letter-spacing: -2px;">0</div>
        <div style="font-size: 0.8em; opacity: 0.5;">BEST: <span id="high-score">0</span></div>
    </div>

    <div id="preview-container">
        <canvas id="preview-canvas" width="50" height="50"></canvas>
    </div>

    <div id="side-controls">
        <button id="g-toggle" class="g-btn" onclick="flipGravity()">G</button>
    </div>

    <div id="overlay">
        <h1 style="font-size: 3em; margin: 0; color: #38bdf8;">GRAVITY</h1>
        <h2 style="font-size: 1.5em; margin-top: 0; opacity: 0.7;">MERGE</h2>
        <button id="start-btn" class="btn" onclick="initGame()">START</button>
    </div>

<script>
    const { Engine, Render, Runner, Bodies, Composite, Events } = Matter;
    
    // Smooth Physics Config
    const engine = Engine.create({
        positionIterations: 10, // Higher = smoother collisions
        velocityIterations: 10
    });

    const width = Math.min(window.innerWidth, 450), height = window.innerHeight;
    
    const render = Render.create({ 
        element: document.body, 
        engine: engine, 
        options: { 
            width, height, 
            wireframes: false, 
            background: 'transparent',
            pixelRatio: window.devicePixelRatio, // High-res fix
            antialiasing: true // Smoother edges
        } 
    });

    const BALL_TYPES = [
        { label: 'Marble', r: 15, col: '#00f2ff', score: 2 },
        { label: 'Rubber', r: 25, col: '#ff007f', score: 5 },
        { label: 'Tennis', r: 35, col: '#ccff00', score: 10 },
        { label: 'Steel', r: 48, col: '#94a3b8', score: 20 },
        { label: 'Bowling', r: 65, col: '#8b5cf6', score: 40 },
        { label: 'Gold', r: 85, col: '#fbbf24', score: 80 },
        { label: 'Giant', r: 110, col: '#ef4444', score: 150 },
        { label: 'Wrecking', r: 140, col: '#1e293b', score: 1000 }
    ];

    let score = 0, nextLevel = 0, currentX = width/2, isGameOver = false, canDrop = true, isStarted = false;
    const dropLineY = 120;

    function initGame() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('g-toggle').style.display = 'block';
        document.getElementById('high-score').innerText = localStorage.getItem('mergeBest') || 0;
        isStarted = true;
        Render.run(render);
        Runner.run(Runner.create(), engine);
        drawPreview();
    }

    function drawPreview() {
        const pCanvas = document.getElementById('preview-canvas');
        const preCtx = pCanvas.getContext('2d');
        preCtx.clearRect(0, 0, 50, 50);
        const t = BALL_TYPES[nextLevel];
        preCtx.beginPath();
        preCtx.arc(25, 25, Math.min(t.r * 0.3, 18), 0, Math.PI*2);
        preCtx.fillStyle = t.col; preCtx.fill();
    }

    function spawn(x, y, lvl) {
        const t = BALL_TYPES[lvl];
        const b = Bodies.circle(x, y, t.r, {
            restitution: lvl === 1 ? 0.7 : 0.2,
            friction: 0.05,
            slop: 0.05, // Helps prevent balls overlapping
            render: { fillStyle: t.col, strokeStyle: 'transparent' }, // Fixes bumpy edges
            plugin: { level: lvl }
        });
        Composite.add(engine.world, b);
    }

    window.addEventListener('pointermove', (e) => {
        const rect = render.canvas.getBoundingClientRect();
        currentX = Math.max(30, Math.min(width - 30, e.clientX - rect.left));
    });

    window.addEventListener('pointerup', () => {
        if (!canDrop || isGameOver || !isStarted) return;
        spawn(currentX, 80, nextLevel);
        canDrop = false;
        setTimeout(() => { canDrop = true; }, 500);
        nextLevel = Math.floor(Math.random() * 3);
        drawPreview();
    });

    function flipGravity() {
        engine.gravity.y *= -1;
        if(window.navigator.vibrate) window.navigator.vibrate(40);
    }

    Events.on(engine, 'collisionStart', (e) => {
        e.pairs.forEach(p => {
            const a = p.bodyA, b = p.bodyB;
            if (a.plugin?.level === b.plugin?.level && a.plugin?.level !== undefined && a.plugin.level < BALL_TYPES.length - 1) {
                const lvl = a.plugin.level + 1;
                score += BALL_TYPES[a.plugin.level].score;
                document.getElementById('score-label').innerText = score;

                if (lvl >= 4) {
                    document.body.style.transform = `translate(${Math.random()*6}px, ${Math.random()*6}px)`;
                    setTimeout(() => { document.body.style.transform = 'translate(0,0)'; }, 50);
                }

                Composite.remove(engine.world, [a, b]);
                spawn((a.position.x + b.position.x)/2, (a.position.y + b.position.y)/2, lvl);
                if (lvl === 7) endGame("VICTORY");
            }
        });
    });

    setInterval(() => {
        if (isGameOver || !isStarted) return;
        Composite.allBodies(engine.world).forEach(b => {
            if (!b.isStatic && b.position.y < dropLineY && Math.abs(b.velocity.y) < 0.05) {
                endGame("STUCK!");
            }
        });
    }, 2500);

    function endGame(msg) {
        isGameOver = true;
        document.getElementById('overlay').style.display = 'flex';
        document.getElementById('status-text').innerText = msg;
        document.getElementById('start-btn').innerText = "RETRY";
        document.getElementById('start-btn').onclick = () => location.reload();
        if (score > (localStorage.getItem('mergeBest') || 0)) localStorage.setItem('mergeBest', score);
    }

    Events.on(render, 'afterRender', () => {
        if (!isStarted) return;
        const ctx = render.context;
        ctx.globalAlpha = 0.15;
        ctx.fillStyle = BALL_TYPES[nextLevel].col;
        ctx.beginPath();
        ctx.arc(currentX, 80, BALL_TYPES[nextLevel].r, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
        ctx.setLineDash([4, 8]); ctx.strokeStyle = "rgba(255,255,255,0.1)";
        ctx.beginPath(); ctx.moveTo(0, dropLineY); ctx.lineTo(width, dropLineY); ctx.stroke();
    });

    const wallOpts = { isStatic: true, render: { fillStyle: '#1e293b' } };
    Composite.add(engine.world, [
        Bodies.rectangle(width/2, height+15, width, 30, wallOpts),
        Bodies.rectangle(width/2, -15, width, 30, wallOpts), // Ceiling for gravity flip
        Bodies.rectangle(-15, height/2, 30, height, wallOpts),
        Bodies.rectangle(width+15, height/2, 30, height, wallOpts)
    ]);
</script>
</body>
</html>
