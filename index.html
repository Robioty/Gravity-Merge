<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Gravity Merge</title>

    <link rel="icon" type="image/png" href="https://replicate.delivery/pbxt/H1qX9bA78O0D8L5U1e4j2i3V1d7m8l9k0j8h7g6f5e4d3c2b1/image_icon.png">
    <link rel="apple-touch-icon" href="https://replicate.delivery/pbxt/H1qX9bA78O0D8L5U1e4j2i3V1d7m8l9k0j8h7g6f5e4d3c2b1/image_icon.png">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #0f172a; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; touch-action: none; transition: transform 0.05s; }
        #ui { position: absolute; top: 15px; left: 15px; color: white; z-index: 10; display: flex; align-items: flex-start; gap: 15px; pointer-events: none; }
        
        .home-btn { 
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); 
            color: white; padding: 10px; border-radius: 10px; cursor: pointer; pointer-events: auto;
            font-size: 1.2em; backdrop-filter: blur(5px);
        }

        #preview-container { position: absolute; top: 15px; right: 15px; background: rgba(30, 41, 59, 0.6); padding: 8px; border-radius: 15px; border: 1px solid rgba(56, 189, 248, 0.2); }
        #overlay { position: absolute; inset: 0; background: rgba(15, 23, 42, 0.98); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; color: white; text-align: center; padding: 20px; }
        
        .stats-box { background: #1e293b; padding: 15px; border-radius: 15px; width: 85%; margin: 10px 0; border: 1px solid #334155; }
        .stat-row { display: flex; justify-content: space-between; margin: 5px 0; font-size: 0.85em; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 3px; }
        
        .leaderboard { margin-top: 10px; width: 100%; border-top: 1px solid #38bdf8; padding-top: 10px; }
        .leader-entry { display: flex; justify-content: space-between; padding: 4px 10px; background: rgba(56, 189, 248, 0.1); border-radius: 5px; margin-bottom: 4px; font-weight: bold; }
        .gold { color: #fbbf24; }

        #side-controls { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); z-index: 50; }
        .g-btn { background: rgba(56, 189, 248, 0.15); color: #38bdf8; border: 2px solid #38bdf8; width: 50px; height: 50px; border-radius: 50%; font-weight: 900; cursor: pointer; display: none; backdrop-filter: blur(5px); }
        
        .btn { background: #38bdf8; color: white; border: none; padding: 15px 40px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1.1em; box-shadow: 0 4px 0 #0369a1; }
        .btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #0369a1; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>
    <div id="ui">
        <button class="home-btn" onclick="location.reload()">🏠</button>
        <div>
            <div id="score-label" style="font-size: 2.5em; font-weight: 900; line-height: 1;">0</div>
            <div style="font-size: 0.7em; opacity: 0.5;">BEST: <span id="high-score-ui">0</span></div>
        </div>
    </div>

    <div id="preview-container"><canvas id="preview-canvas" width="45" height="45"></canvas></div>

    <div id="side-controls"><button id="g-toggle" class="g-btn" onclick="flipGravity()">G</button></div>

    <div id="overlay">
        <h1 id="status-text" style="font-size: 2.5em; margin: 0; color: #38bdf8;">GRAVITY MERGE</h1>
        
        <div id="stats-display" class="stats-box" style="display:none;">
            <div class="stat-row"><span>This Run:</span> <b id="stat-score" class="gold">0</b></div>
            <div class="stat-row"><span>Biggest Ball:</span> <b id="stat-biggest">-</b></div>
            
            <div class="leaderboard">
                <div style="font-size: 0.7em; margin-bottom: 5px; opacity: 0.7;">LOCAL TOP 3</div>
                <div id="leader-list"></div>
            </div>
        </div>

        <button id="main-btn" class="btn" onclick="initGame()">START GAME</button>
    </div>

<script>
    const { Engine, Render, Runner, Bodies, Composite, Events } = Matter;
    
    const engine = Engine.create({ positionIterations: 15, velocityIterations: 15 });
    const width = Math.min(window.innerWidth, 450), height = window.innerHeight;
    const render = Render.create({ 
        element: document.body, engine: engine, 
        options: { width, height, wireframes: false, background: 'transparent', pixelRatio: window.devicePixelRatio, antialiasing: true } 
    });

    const BALL_TYPES = [
        { label: 'Marble', r: 15, col: '#00f2ff', score: 2, mass: 1 },
        { label: 'Rubber', r: 25, col: '#ff007f', score: 5, mass: 0.5 },
        { label: 'Tennis', r: 35, col: '#ccff00', score: 10, mass: 2 },
        { label: 'Steel', r: 48, col: '#94a3b8', score: 20, mass: 15 }, 
        { label: 'Bowling', r: 65, col: '#8b5cf6', score: 40, mass: 30 },
        { label: 'Gold', r: 85, col: '#fbbf24', score: 80, mass: 60 },
        { label: 'Giant', r: 110, col: '#ef4444', score: 150, mass: 120 },
        { label: 'Wrecking', r: 140, col: '#1e293b', score: 1000, mass: 300 }
    ];

    let gameStats = { score: 0, maxLevel: 0 };
    let nextLevel = 0, currentX = width/2, isGameOver = false, canDrop = true, isStarted = false;
    const dropLineY = 125;

    function initGame() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('g-toggle').style.display = 'block';
        updateUIBest();
        isStarted = true;
        Render.run(render);
        Runner.run(Runner.create(), engine);
        drawPreview();
    }

    function updateUIBest() {
        const scores = JSON.parse(localStorage.getItem('mergeHistory') || '[]');
        document.getElementById('high-score-ui').innerText = scores[0] || 0;
    }

    function drawPreview() {
        const preCtx = document.getElementById('preview-canvas').getContext('2d');
        preCtx.clearRect(0, 0, 45, 45);
        const t = BALL_TYPES[nextLevel];
        preCtx.beginPath();
        preCtx.arc(22, 22, Math.min(t.r * 0.3, 16), 0, Math.PI*2);
        preCtx.fillStyle = t.col; preCtx.fill();
    }

    function spawn(x, y, lvl) {
        const t = BALL_TYPES[lvl];
        const b = Bodies.circle(x, y, t.r, {
            restitution: lvl === 1 ? 0.6 : 0.1,
            friction: 0.3,
            density: t.mass * 0.002,
            render: { fillStyle: t.col, strokeStyle: 'transparent' },
            plugin: { level: lvl }
        });
        Composite.add(engine.world, b);
        if(lvl > gameStats.maxLevel) gameStats.maxLevel = lvl;
    }

    const handleInput = (clientX) => {
        const rect = render.canvas.getBoundingClientRect();
        currentX = Math.max(30, Math.min(width - 30, clientX - rect.left));
    };

    window.addEventListener('pointermove', (e) => handleInput(e.clientX));
    window.addEventListener('touchmove', (e) => handleInput(e.touches[0].clientX));

    window.addEventListener('pointerup', () => {
        if (!canDrop || isGameOver || !isStarted) return;
        spawn(currentX, 85, nextLevel);
        canDrop = false;
        setTimeout(() => { canDrop = true; }, 550);
        nextLevel = Math.floor(Math.random() * 3);
        drawPreview();
    });

    function flipGravity() {
        engine.gravity.y *= -1;
        if(window.navigator.vibrate) window.navigator.vibrate(35);
    }

    Events.on(engine, 'collisionStart', (e) => {
        e.pairs.forEach(p => {
            const a = p.bodyA, b = p.bodyB;
            if (a.plugin?.level === b.plugin?.level && a.plugin?.level !== undefined && a.plugin.level < BALL_TYPES.length - 1) {
                const lvl = a.plugin.level + 1;
                gameStats.score += BALL_TYPES[a.plugin.level].score;
                document.getElementById('score-label').innerText = gameStats.score;

                if (lvl >= 4) {
                    document.body.style.transform = `translate(${Math.random()*8}px, ${Math.random()*8}px)`;
                    setTimeout(() => { document.body.style.transform = 'translate(0,0)'; }, 50);
                }

                Composite.remove(engine.world, [a, b]);
                spawn((a.position.x + b.position.x)/2, (a.position.y + b.position.y)/2, lvl);
                if (lvl === 7) endGame("VICTORY");
            }
        });
    });

    setInterval(() => {
        if (isGameOver || !isStarted) return;
        Composite.allBodies(engine.world).forEach(b => {
            if (!b.isStatic && b.position.y < dropLineY && Math.abs(b.velocity.y) < 0.04) endGame("FULL!");
        });
    }, 2500);

    function saveScore(newScore) {
        let scores = JSON.parse(localStorage.getItem('mergeHistory') || '[]');
        scores.push(newScore);
        scores.sort((a, b) => b - a);
        scores = [...new Set(scores)].slice(0, 3);
        localStorage.setItem('mergeHistory', JSON.stringify(scores));
        return scores;
    }

    function endGame(msg) {
        isGameOver = true;
        document.getElementById('overlay').style.display = 'flex';
        document.getElementById('stats-display').style.display = 'block';
        document.getElementById('status-text').innerText = msg;
        document.getElementById('stat-score').innerText = gameStats.score;
        document.getElementById('stat-biggest').innerText = BALL_TYPES[gameStats.maxLevel].label;
        
        const topScores = saveScore(gameStats.score);
        document.getElementById('leader-list').innerHTML = topScores.map((s, i) => `
            <div class="leader-entry"><span>#${i+1}</span><span class="${s === gameStats.score ? 'gold' : ''}">${s}</span></div>
        `).join('');

        document.getElementById('main-btn').innerText = "RETRY";
        document.getElementById('main-btn').onclick = () => location.reload();
    }

    Events.on(render, 'afterRender', () => {
        if (!isStarted) return;
        const ctx = render.context;
        ctx.globalAlpha = 0.1; ctx.fillStyle = BALL_TYPES[nextLevel].col;
        ctx.beginPath(); ctx.arc(currentX, 85, BALL_TYPES[nextLevel].r, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = 1;
        ctx.setLineDash([5, 10]); ctx.strokeStyle = "rgba(255,255,255,0.1)";
        ctx.beginPath(); ctx.moveTo(0, dropLineY); ctx.lineTo(width, dropLineY); ctx.stroke();
    });

    const wallOpts = { isStatic: true, render: { fillStyle: '#1e293b' } };
    Composite.add(engine.world, [
        Bodies.rectangle(width/2, height+15, width, 30, wallOpts),
        Bodies.rectangle(width/2, -15, width, 30, wallOpts),
        Bodies.rectangle(-15, height/2, 30, height, wallOpts),
        Bodies.rectangle(width+15, height/2, 30, height, wallOpts)
    ]);
</script>
</body>
</html>
